{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Login - MC4 CRM</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link rel="stylesheet" href="{% static 'css/style.css' %}">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        body {
            background: linear-gradient(135deg, #00A5B5, #416ba9);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color:aliceblue;
        }

        .login-card {
            border-radius: 12px;
            padding: 30px;
            width: 100%;
            max-width: 400px;

        }

        .login-logo {
            text-align: center;
            margin-bottom: 20px;
        }

        .login-logo img {
            width: 120px;
        }

        .btn-mc4 {
            background-color: var(--mc4-lime);
            color: white;
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
        }

        .btn-mc4:hover {
            background-color: #008c9a;
        }
        
        input {
        width: 100%;
        border-radius: 6px;
        border: 1px solid #ced4da;
        padding: 8px;
        }

    </style>
</head>

<body>

<div class="login-card vidro-container">

    <!-- Logo -->
    <div class="login-logo ">
        <img src="https://rkhgeaikydlrnuwttnge.supabase.co/storage/v1/object/public/images/MC4%20CRM_BRANCA_02.svg">
    </div>
    
    
    {% if form.errors %}
    <div class="alert alert-danger text-center">
        Usuário ou senha inválidos.
    </div>
    {% endif %}


    <!-- FORM LOGIN -->
    <form method="POST" action="{% url 'account_login' %}">
        {% csrf_token %}

        {% if form.errors %}
            <div class="alert alert-danger text-center">
                Usuário ou senha inválidos.
            </div>
        {% endif %}

        <div class="mb-3">
            <label class="form-label">Usuário ou Email</label>
            {{ form.login }}
        </div>

        <div class="mb-3">
            <label class="form-label">Senha</label>
            {{ form.password }}
        </div>

        <button type="submit" class="btn btn-mc4 w-100">
            Entrar
        </button>
    </form>

</div>

</body>
</html>
